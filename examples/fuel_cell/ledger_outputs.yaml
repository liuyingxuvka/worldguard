ledger_outputs:
  artifact_version: repair-v5-artifact
  event_ledger:
    - {claim_id: c_run_demo, event: e_c_precheck, fluent: c_precheck_complete, status_impact: supports_pass}
    - {claim_id: c_run_demo, event: e_a_start_demo, fluent: cell_running, status_impact: supports_pass}
    - {claim_id: c_output_voltage, event: e_voltage_trace, fluent: voltage_output_available, status_impact: supports_pass}
  agent_ledger:
    - {claim_id: c_run_demo, agent: CompanyA.lead_engineer, intention: i_start_demo, status_impact: supports_pass}
    - {claim_id: c_share_full_recipe, agent: CompanyA.lead_engineer, intention: i_share_full_log, status_impact: informational}
  space_ledger:
    - {claim_id: c_run_demo, relation: NTPP(prototype_stack,lab_B_test_bench,t1), status_impact: supports_pass}
    - {claim_id: c_run_demo, relation: DC(lab_B_test_bench,lab_C_review_room,t1), status_impact: supports_pass}
  resource_ledger:
    - {claim_id: c_output_voltage, transition: run_demo, consumed: [{place: hydrogen_cartridge, color: h2, qty: 1}, {place: prototype_stack, color: stack, qty: 1}, {place: bench_slot, color: slot, qty: 1}], produced: [{place: voltage_trace, color: demo_voltage, qty: 1}], status_impact: supports_pass}
  causal_ledger:
    - {claim_id: c_output_voltage, query: do(run_demo=true), descendants: [cell_running, voltage_output], status_impact: supports_pass}
  conflict_ledger:
    - {claim_id: c_share_full_recipe, error: CONFLICT_POLICY_CONTRADICTION, status_impact: supports_fail}
  norm_ledger:
    - {claim_id: c_share_full_recipe, norm: n_recipe_forbidden_under_nda, derives: F_A(share_membrane_recipe), status_impact: supports_fail}
  counterexample_ledger:
    - guard: ConflictGuard
      trace:
        - {state: demo_ready, full_log_reward_for_CompanyC: -5}
        - {state: demo_ready, redacted_log_reward_for_CompanyC: 3}
    - guard: NormGuard
      trace:
        - {fact: nda_active}
        - {derives: F_A(share_membrane_recipe)}
        - {claim: P_A(share_membrane_recipe)}
  aggregate_ledger:
    - {check_id: wg13_repair_v5_artifact_expected_report, aggregate_status: FAIL, demo_outcome_label: CONTRADICTION, status_mapping: CONTRADICTION_AS_FAIL}
  artifact_scope_note:
    sibling_deliverable_checks_required: true
    artifact_child_alone_closes_blocker_0004: false
    no_real_world_claims:
      - no real fuel-cell physics validation
      - no legal compliance finding
      - no safety certification
      - no deployment readiness
      - no market truth
      - no strategy proof
